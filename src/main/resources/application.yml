server:
  port: 8080

spring:
  application:
    name: springboot-anthropic-sdk

anthropic:
  api-key:  ${EP_ACC_ANTHOPIC_KEY}
  model: claude-haiku-4-5-20251001
  max-tokens: 400
  system-prompt-id: SCHOOL_TEACHER

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.prince.anthropic.sdk.client.AnthropicApiClient: DEBUG